<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Slotted.ai Contact</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #faf9f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 1rem; }
    .card { background: white; border-radius: 1rem; padding: 2rem; max-width: 320px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    p { color: #6b7280; font-size: 0.875rem; margin: 0 0 1.5rem; }
    .btn { display: inline-block; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; padding: 0.75rem 1.5rem; border-radius: 0.75rem; text-decoration: none; font-weight: 600; font-size: 0.875rem; }
    .logo { font-size: 2.5rem; margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📅</div>
    <h1>Slotted.ai</h1>
    <p>Save our number so you always know it's us when we text.</p>
    <a class="btn" href="/slotted.vcf" download="slotted.vcf">Add to Contacts</a>
  </div>
</body>
</html>
